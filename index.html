<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aqua Marine KA5</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#D8D8D8;
  font-family:'Roboto', sans-serif;
  font-size:17px;
  color:#2b2b2b;
  line-height:1.95;
}

header{
  background:linear-gradient(135deg,#033c3c,#0f6a6a);
  color:white;
  text-align:center;
  padding:60px 20px;
  opacity:0;
  animation: fadeIn 1.2s forwards;
}

header h1{
  font-weight:700;
  font-size:3.2rem;
  margin:0 0 10px;
}

header p{
  font-size:1.2rem;
  margin:0;
}

.lang-switch{
  text-align:center;
  margin:15px 0;
}

.lang-switch button{
  margin:0 5px;
}

.container{
  max-width:1150px;
  margin:auto;
  padding:20px;
}

.card{
  background:white;
  padding:30px;
  margin:20px 0;
  border-radius:16px;
  box-shadow:0 12px 30px rgba(0,0,0,0.08);
  opacity:0;
  transform:translateY(30px);
  transition:all 0.8s ease-out;
}

.card.visible{
  opacity:1;
  transform:translateY(0);
}

h2{
  font-weight:700;
  font-size:1.9rem;
  color:#000;
  margin-bottom:15px;
}

button{
  background:#0f6a6a;
  color:white;
  border:none;
  padding:12px 22px;
  border-radius:8px;
  cursor:pointer;
  font-size:15px;
  transition:transform 0.3s;
}

button:hover{ transform:scale(1.05); }

.input-field{
  margin-bottom:10px;
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #cfcfcf;
  font-size:16px;
  background:#f7f7f7;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:15px;
}

.gallery img{
  width:100%;
  height:160px;
  object-fit:cover;
  border-radius:12px;
  cursor:pointer;
  transition:transform 0.3s;
}

.gallery img:hover{ transform:scale(1.05); }

#lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:9999;
}

#lightbox img{
  max-width:90%;
  max-height:80%;
  border-radius:12px;
  margin-bottom:15px;
}

#lightbox-controls{
  display:flex;
  justify-content:center;
  gap:15px;
}

#lightbox-controls button{
  background:#0f6a6a;
  border-radius:50%;
  width:50px;
  height:50px;
}

.map-container{
  width:100%;
  height:400px;
  border-radius:14px;
  overflow:hidden;
}

.payment-box{
  margin-top:20px;
  padding:15px;
  background:#f2f2f2;
  border-radius:12px;
}

@keyframes fadeIn{ to{opacity:1;} }
</style>
</head>

<body>

<header>
<h1>Aqua Marine KA5</h1>
<p id="subtitle"></p>
</header>

<div class="lang-switch">
<button onclick="setLang('bg')">Български</button>
<button onclick="setLang('en')">English</button>
</div>

<div class="container">

<div class="card">
<h2 id="aboutTitle"></h2>
<p id="aboutText"></p>
</div>

<div class="card">
<h2 id="pricesTitle"></h2>
<p id="pricesText"></p>
</div>

<div class="card">
<h2 id="galleryTitle"></h2>
<div class="gallery" id="gallery"></div>
</div>

<div id="lightbox">
<img id="lightbox-img">
<div id="lightbox-controls">
<button onclick="prevImage()">←</button>
<button onclick="nextImage()">→</button>
<button onclick="closeLightbox()">✕</button>
</div>
</div>

<div class="card">
<h2 id="bookingTitle"></h2>

<label id="checkinLabel"></label>
<input type="date" id="checkin" class="input-field">

<label id="nightsLabel"></label>
<input type="number" id="nights" min="1" value="1" class="input-field">

<p id="priceResult" style="font-weight:600;"></p>
<p id="depositResult" style="font-weight:600;"></p>

<div class="payment-box">
<p><strong>Плащане на депозит:</strong></p>

<p>
IBAN: <strong id="ibanText">BG02UNCR70001522527069</strong>
<button onclick="copyIBAN()">Копирай</button>
</p>

<p>Титуляр: Антоанета Кънева</p>

<button onclick="showRevolut()">Плати чрез Revolut (@antoan2vle)</button>
</div>

</div>

</div>

<script>
const t={
bg:{
subtitle:"Луксозен апартамент в Неа Перамос • 2 км от яхтеното пристанище на Ираклица",
aboutTitle:"ЗА АПАРТАМЕНТА",
about:"Луксозен апартамент с двор, паркомясто и близост до плажовете Амолофи.",
pricesTitle:"ЦЕНИ",
prices:"Под 5 нощувки: 160€/вечер<br>5 или повече нощувки: 150€/вечер",
bookingTitle:"РЕЗЕРВАЦИЯ",
checkin:"Дата на настаняване:",
nights:"Брой нощувки:",
priceLabel:"Обща цена за престой:",
depositLabel:"Общ депозит (20%):",
galleryTitle:"ГАЛЕРИЯ"
},
en:{
subtitle:"Luxury apartment in Nea Peramos • 2 km from Iraklitsa Marina",
aboutTitle:"ABOUT THE APARTMENT",
about:"Luxury apartment with yard, parking and proximity to Amolofi beaches.",
pricesTitle:"PRICES",
prices:"Less than 5 nights: 160€/night<br>5+ nights: 150€/night",
bookingTitle:"BOOKING",
checkin:"Check-in date:",
nights:"Number of nights:",
priceLabel:"Total stay price:",
depositLabel:"Total deposit (20%):",
galleryTitle:"GALLERY"
}
};

let currentLang='bg';

function setLang(lang){
 currentLang=lang;
 document.getElementById('subtitle').innerHTML=t[lang].subtitle;
 document.getElementById('aboutTitle').innerHTML=t[lang].aboutTitle;
 document.getElementById('aboutText').innerHTML=t[lang].about;
 document.getElementById('pricesTitle').innerHTML=t[lang].pricesTitle;
 document.getElementById('pricesText').innerHTML=t[lang].prices;
 document.getElementById('checkinLabel').innerHTML=t[lang].checkin;
 document.getElementById('nightsLabel').innerHTML=t[lang].nights;
 document.getElementById('bookingTitle').innerHTML=t[lang].bookingTitle;
 document.getElementById('galleryTitle').innerHTML=t[lang].galleryTitle;
 updatePrice();
}

setLang('bg');

function updatePrice(){
 const nights=parseInt(document.getElementById('nights').value)||0;
 const pricePerNight=nights>=5?150:160;
 const total=nights*pricePerNight;
 const deposit=total*0.2;

 document.getElementById('priceResult').innerHTML=
   t[currentLang].priceLabel+" "+total+"€";
 document.getElementById('depositResult').innerHTML=
   t[currentLang].depositLabel+" "+deposit.toFixed(2)+"€";
}

document.getElementById('nights').addEventListener('input',updatePrice);
updatePrice();

function copyIBAN(){
 const text=document.getElementById("ibanText").innerText;
 navigator.clipboard.writeText(text);
 alert("IBAN копиран: "+text);
}

function showRevolut(){
 alert("Изпратете депозита чрез Revolut към: @antoan2vle");
}
</script>

</body>
</html>
