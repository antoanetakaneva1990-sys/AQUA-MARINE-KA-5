<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aqua Marine KA5</title>

<link href="https://fonts.googleapis.com/css2?family=Allura&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://js.stripe.com/v3/"></script>

<style>
body{
  margin:0;
  background:#D8D8D8; /* RAL 9002 */
  font-family:'Cormorant Garamond', serif;
  font-size:16.5px;
  color:#2b2b2b;
  line-height:1.8;
}

header{
  background:linear-gradient(135deg,#033c3c,#0f6a6a);
  color:white;
  text-align:center;
  padding:60px 20px;
}

header h1{
  font-family:'Allura', cursive;
  font-size:3.8rem;
  margin:0;
}

.container{
  max-width:1150px;
  margin:auto;
  padding:25px;
}

.card{
  background:white;
  padding:40px;
  margin:25px 0;
  border-radius:16px;
  box-shadow:0 12px 30px rgba(0,0,0,0.08);
}

h2{
  font-family:'Allura', cursive;
  font-size:2.3rem;
  color:#000;
}

button{
  background:#0f6a6a;
  color:white;
  border:none;
  padding:12px 22px;
  border-radius:8px;
  cursor:pointer;
  font-size:15px;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
}

.gallery img{
  width:100%;
  height:160px;
  object-fit:cover;
  border-radius:12px;
  cursor:pointer;
}

#lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:999;
}

#lightbox img{
  max-width:85%;
  max-height:85%;
}

.map-container{
  width:100%;
  height:400px;
  border-radius:14px;
  overflow:hidden;
}
</style>
</head>
<body>

<header>
<h1>Aqua Marine KA5</h1>
<p id="subtitle"></p>
</header>

<div style="text-align:center;margin:20px;">
<button onclick="setLang('bg')">Български</button>
<button onclick="setLang('en')">English</button>
</div>

<div class="container">

<!-- ABOUT -->
<div class="card">
<h2 id="aboutTitle">ЗА АПАРТАМЕНТА</h2>
<p id="aboutText"></p>
</div>

<!-- PRICES -->
<div class="card">
<h2 id="pricesTitle">ЦЕНИ</h2>
<p id="pricesText"></p>
</div>

<!-- GALLERY -->
<div class="card">
<h2 id="galleryTitle">ГАЛЕРИЯ</h2>
<div class="gallery" id="gallery"></div>
</div>

<div id="lightbox">
<img id="lightbox-img">
<div style="margin-top:15px;">
<button onclick="prevImage()">←</button>
<button onclick="nextImage()">→</button>
<button onclick="closeLightbox()">✕</button>
</div>
</div>

<!-- BOOKING -->
<div class="card">
<h2 id="bookingTitle">РЕЗЕРВАЦИЯ</h2>

<label id="checkinLabel"></label>
<input type="date" id="checkin">

<label id="nightsLabel"></label>
<input type="number" id="nights" min="1" value="1">

<p id="priceResult"></p>
<p id="depositResult"></p>

<button id="payBtn">ПЛАТИ ДЕПОЗИТ</button>
</div>

<!-- CONTACTS -->
<div class="card">
<h2 id="contactTitle">КОНТАКТИ</h2>
<p id="contactText"></p>
</div>

<!-- MAP -->
<div class="card">
<h2 id="mapTitle">ЛОКАЦИЯ</h2>
<div class="map-container">
<iframe src="https://www.google.com/maps?q=40.8517289,24.3140363&z=16&output=embed" width="100%" height="100%" style="border:0;"></iframe>
</div>
</div>

</div>

<script>
// ---------- LANGUAGE ----------
const t={
bg:{
subtitle:"Луксозен апартамент в Неа Перамос • Само на 80 метра от морето",
about:`Потопете се в свят на спокойствие и изискан морски комфорт.

<strong>Aqua Marine KA5</strong> съчетава елегантен интериор, простор и внимание към всеки детайл.

Само на <strong>80 метра от плажа</strong> и със <strong>собствено паркомясто</strong> — удобство, което превръща престоя ви в истински безгрижен.

Тераса с барбекю, светлина, стил и усещане за премиум почивка край морето.`,
prices:`Под 5 нощувки: <strong>160€/вечер</strong><br>
5 или повече нощувки: <strong>150€/вечер</strong><br>
Депозит: 20%`,
checkin:"Дата на настаняване:",
nights:"Брой нощувки:",
price:"Обща цена:",
deposit:"Депозит (20%):",
contacts:`📧 Имейл: antoaneta_n_k@yahoo.dk<br>
📞 Телефон: 00359876644933`
},
en:{
subtitle:"Luxury apartment in Nea Peramos • Only 80 meters from the beach",
about:`Step into a world of calm, elegance and seaside comfort.

<strong>Aqua Marine KA5</strong> combines stylish interior, space and attention to every detail.

Only <strong>80 meters from the beach</strong> and with a <strong>private parking space</strong> — comfort that makes your stay completely carefree.

BBQ terrace, light, style and a true premium holiday feeling by the sea.`,
prices:`Less than 5 nights: <strong>160€/night</strong><br>
5+ nights: <strong>150€/night</strong><br>
Deposit: 20%`,
checkin:"Check-in date:",
nights:"Number of nights:",
price:"Total price:",
deposit:"Deposit (20%):",
contacts:`📧 Email: antoaneta_n_k@yahoo.dk<br>
📞 Phone: 00359876644933`
}
};

let currentLang='bg';

function setLang(lang){
 currentLang=lang;
 document.getElementById('subtitle').innerHTML=t[lang].subtitle;
 document.getElementById('aboutText').innerHTML=t[lang].about;
 document.getElementById('pricesText').innerHTML=t[lang].prices;
 document.getElementById('checkinLabel').innerHTML=t[lang].checkin;
 document.getElementById('nightsLabel').innerHTML=t[lang].nights;
 document.getElementById('contactText').innerHTML=t[lang].contacts;
 updatePrice();
}
setLang('bg');

// ---------- PRICE ----------
function updatePrice(){
 const nights=parseInt(document.getElementById('nights').value)||0;
 const pricePerNight=nights>=5?150:160;
 const total=nights*pricePerNight;
 const deposit=total*0.2;

 document.getElementById('priceResult').innerHTML=
   t[currentLang].price+" "+total+"€";
 document.getElementById('depositResult').innerHTML=
   t[currentLang].deposit+" "+deposit.toFixed(2)+"€";
}
document.getElementById('nights').addEventListener('input',updatePrice);
updatePrice();

// ---------- GALLERY ----------
const gallery=document.getElementById('gallery');
for(let i=1;i<=19;i++){
 const img=document.createElement('img');
 img.src='img'+i+'.jpg';
 img.dataset.index=i-1;
 gallery.appendChild(img);
}

let images=document.querySelectorAll('#gallery img');
let currentIndex=0;

images.forEach(img=>{
 img.onclick=()=>{
  currentIndex=parseInt(img.dataset.index);
  document.getElementById('lightbox').style.display='flex';
  document.getElementById('lightbox-img').src=img.src;
 };
});

function closeLightbox(){document.getElementById('lightbox').style.display='none';}
function prevImage(){currentIndex=(currentIndex-1+images.length)%images.length;document.getElementById('lightbox-img').src=images[currentIndex].src;}
function nextImage(){currentIndex=(currentIndex+1)%images.length;document.getElementById('lightbox-img').src=images[currentIndex].src;}

// ---------- STRIPE TEST ----------
const stripe=Stripe('pk_test_51NEXAMPLEYOURTESTKEY');
document.getElementById('payBtn').onclick=()=>alert('Stripe тестов бутон — готов за свързване.');
</script>

</body>
</html>
