<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aqua Marine KA5</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#D8D8D8;
  font-family:'Roboto', sans-serif;
  color:#2b2b2b;
  line-height:1.8;
}

header{
  background:linear-gradient(135deg,#033c3c,#0f6a6a);
  color:white;
  text-align:center;
  padding:50px 20px;
}

header h1{
  font-size:2.5rem;
  margin:0;
}

header p{
  margin-top:10px;
  font-size:1.1rem;
}

.lang-switch{
  text-align:center;
  margin:15px 0;
}

.lang-switch button{
  margin:5px;
  background:#0f6a6a;
  color:white;
  border:none;
  padding:8px 16px;
  border-radius:6px;
  cursor:pointer;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:15px;
}

.card{
  background:white;
  padding:25px;
  margin:20px 0;
  border-radius:14px;
  box-shadow:0 8px 25px rgba(0,0,0,0.08);
}

h2{
  margin-bottom:15px;
}

.input-field{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:16px;
}

button.main-btn{
  background:#0f6a6a;
  color:white;
  border:none;
  padding:12px 20px;
  border-radius:8px;
  cursor:pointer;
  font-size:15px;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:12px;
}

.gallery img{
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:10px;
  cursor:pointer;
}

#lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:9999;
}

#lightbox img{
  max-width:95%;
  max-height:80%;
  border-radius:10px;
  margin-bottom:15px;
}

.map-container{
  width:100%;
  height:350px;
  border-radius:12px;
  overflow:hidden;
}

@media (min-width:768px){
  header h1{font-size:3rem;}
  .gallery img{height:180px;}
}
</style>
</head>

<body>

<header>
<h1>Aqua Marine KA5</h1>
<p id="subtitle"></p>
</header>

<div class="lang-switch">
<button onclick="setLang('bg')">Български</button>
<button onclick="setLang('en')">English</button>
</div>

<div class="container">

<div class="card">
<h2 id="aboutTitle"></h2>
<p id="aboutText"></p>
</div>

<div class="card">
<h2 id="stayTitle"></h2>
<p id="stayText"></p>
</div>

<div class="card">
<h2 id="pricesTitle"></h2>
<p id="pricesText"></p>
</div>

<div class="card">
<h2 id="bookingTitle"></h2>

<label id="checkinLabel"></label>
<input type="date" class="input-field">

<label id="nightsLabel"></label>
<input type="number" id="nights" min="1" value="1" class="input-field">

<p id="totalPrice" style="font-weight:600;"></p>
<p id="depositPrice" style="font-weight:600;"></p>

<button class="main-btn" id="payBtn"></button>
</div>

<div class="card">
<h2 id="galleryTitle"></h2>
<div class="gallery" id="gallery"></div>
</div>

<div id="lightbox">
<img id="lightbox-img">
<button class="main-btn" onclick="closeLightbox()">Close</button>
</div>

<div class="card">
<h2 id="contactTitle"></h2>
<p id="contactText"></p>
<p>🌐 <a href="https://www.facebook.com/share/17wdG6LS9p/?mibextid=wwXIfr" target="_blank">Facebook</a></p>
</div>

<div class="card">
<h2 id="mapTitle"></h2>
<div class="map-container">
<iframe src="https://www.google.com/maps?q=40.8517289,24.3140363&z=16&output=embed"
width="100%" height="100%" style="border:0;" allowfullscreen></iframe>
</div>
</div>

</div>

<script>

let currentLang="bg";

const t={
bg:{
subtitle:"Луксозен апартамент в Неа Перамос • 2 км от Ираклица",
aboutTitle:"ЗА АПАРТАМЕНТА",
about:"Aqua Marine KA5 е идеален за до 4 гости с две отделни спални и възможност за спане на диван. Телевизор във всяка стая, централна климатизация, баня с тоалетна и отделна тоалетна. Разполага с пералня, миялна, двор 20 м², паркомясто и тераса с барбекю.",
stayTitle:"НАСТАНЯВАНЕ",
stayText:"Настаняване: след 14:00 ч.<br>Напускане: до 10:00 ч.",
pricesTitle:"ЦЕНИ",
prices:"Под 5 нощувки: 160€/вечер<br>5+ нощувки: 150€/вечер",
bookingTitle:"РЕЗЕРВАЦИЯ",
checkin:"Дата на настаняване:",
nights:"Брой нощувки:",
total:"Обща цена:",
deposit:"Депозит (20%):",
pay:"ПЛАТИ ДЕПОЗИТ",
galleryTitle:"ГАЛЕРИЯ",
contactTitle:"КОНТАКТИ",
contactText:"📧 Имейл: antoaneta_n_k@yahoo.dk<br>📞 Телефон: 00359876644933",
mapTitle:"ЛОКАЦИЯ"
},
en:{
subtitle:"Luxury apartment in Nea Peramos • 2 km from Iraklitsa",
aboutTitle:"ABOUT THE APARTMENT",
about:"Aqua Marine KA5 accommodates up to 4 guests with two separate bedrooms and sofa option. TV in every room, central air conditioning, bathroom plus additional toilet. Includes washing machine, dishwasher, 20 m² yard, private parking and barbecue terrace.",
stayTitle:"CHECK-IN / CHECK-OUT",
stayText:"Check-in: after 14:00<br>Check-out: until 10:00",
pricesTitle:"PRICES",
prices:"Less than 5 nights: 160€/night<br>5+ nights: 150€/night",
bookingTitle:"BOOKING",
checkin:"Check-in date:",
nights:"Number of nights:",
total:"Total price:",
deposit:"Deposit (20%):",
pay:"PAY DEPOSIT",
galleryTitle:"GALLERY",
contactTitle:"CONTACT",
contactText:"📧 Email: antoaneta_n_k@yahoo.dk<br>📞 Phone: 00359876644933",
mapTitle:"LOCATION"
}
};

function setLang(lang){
currentLang=lang;
for(let key in t[lang]){
let el=document.getElementById(key);
if(el) el.innerHTML=t[lang][key];
}
updatePrice();
}

function updatePrice(){
let nights=parseInt(document.getElementById('nights').value)||0;
let pricePerNight=nights>=5?150:160;
let total=nights*pricePerNight;
let deposit=total*0.2;
document.getElementById('totalPrice').innerHTML=t[currentLang].total+" "+total+"€";
document.getElementById('depositPrice').innerHTML=t[currentLang].deposit+" "+deposit.toFixed(2)+"€";
}

document.getElementById('nights').addEventListener('input',updatePrice);
setLang('bg');

const gallery=document.getElementById('gallery');
for(let i=1;i<=19;i++){
let img=document.createElement('img');
img.src='img'+i+'.jpg';
img.onclick=function(){
document.getElementById('lightbox').style.display='flex';
document.getElementById('lightbox-img').src=this.src;
}
gallery.appendChild(img);
}

function closeLightbox(){
document.getElementById('lightbox').style.display='none';
}

</script>

</body>
</html>
