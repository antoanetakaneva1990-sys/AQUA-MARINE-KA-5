<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aqua Marine KA5 - Галерия</title>
<style>
body {margin:0;font-family:Arial,sans-serif;background:#f2f6fb;color:#222;}
header{background:linear-gradient(135deg,#0077b6,#00c6ff);color:white;text-align:center;padding:30px;}
header h1{margin:0;font-size:2.5rem;}
.container{max-width:1200px;margin:auto;padding:20px;}
.gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;}
.gallery img{width:100%;border-radius:12px;cursor:pointer;object-fit:cover;height:150px;transition:0.3s;}
.gallery img:hover{transform:scale(1.05);}
#lightbox{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);display:none;justify-content:center;align-items:center;z-index:1000;}
#lightbox img{max-width:90%;max-height:90%;border-radius:12px;}
footer{text-align:center;padding:20px;color:#555;background:#eee;}
</style>
</head>
<body>

<header>
<h1>Aqua Marine KA5 - Галерия</h1>
</header>

<div class="container">
<div class="gallery">
<img src="img1.jpg" onclick="openImage(this.src)">
<img src="img2.jpg" onclick="openImage(this.src)">
<img src="img3.jpg" onclick="openImage(this.src)">
<img src="img4.jpg" onclick="openImage(this.src)">
<img src="img5.jpg" onclick="openImage(this.src)">
<img src="img6.jpg" onclick="openImage(this.src)">
<img src="img7.jpg" onclick="openImage(this.src)">
<img src="img8.jpg" onclick="openImage(this.src)">
<img src="img9.jpg" onclick="openImage(this.src)">
<img src="img10.jpg" onclick="openImage(this.src)">
<img src="img11.jpg" onclick="openImage(this.src)">
<img src="img12.jpg" onclick="openImage(this.src)">
<img src="img13.jpg" onclick="openImage(this.src)">
<img src="img14.jpg" onclick="openImage(this.src)">
<img src="img15.jpg" onclick="openImage(this.src)">
<img src="img16.jpg" onclick="openImage(this.src)">
<img src="img17.jpg" onclick="openImage(this.src)">
<img src="img18.jpg" onclick="openImage(this.src)">
<img src="img19.jpg" onclick="openImage(this.src)">
</div>
</div>

<div id="lightbox" onclick="closeImage()">
<img id="lightbox-img">
</div>

<footer>
© 2026 Aqua Marine KA5 • Неа Перамос
</footer>

<script>
function openImage(src){
  document.getElementById("lightbox").style.display="flex";
  document.getElementById("lightbox-img").src=src;
}
function closeImage(){
  document.getElementById("lightbox").style.display="none";
}
</script>

</body>
</html>
