<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aqua Marine KA5</title>

<style>
body{margin:0;font-family:Arial;background:#f2f6fb;}
header{background:linear-gradient(135deg,#0077b6,#00c6ff);color:white;text-align:center;padding:40px 20px;}
.lang-switch{text-align:center;margin:15px;}
button{padding:10px 15px;margin:5px;border:none;border-radius:6px;cursor:pointer;font-size:16px;}
.primary{background:#0077b6;color:white;}
.container{max-width:1100px;margin:auto;padding:20px;}
.card{background:white;margin:20px 0;padding:20px;border-radius:12px;box-shadow:0 0 10px rgba(0,0,0,0.1);}
.gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;padding:20px;}
.gallery img{width:100%;border-radius:10px;cursor:pointer;transition:0.3s;}
.gallery img:hover{transform:scale(1.05);}
#lightbox{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:none;justify-content:center;align-items:center;z-index:1000;}
#lightbox img{max-width:90%;max-height:90%;border-radius:12px;}
footer{text-align:center;padding:30px;color:#666;}
</style>
</head>

<body>

<header>
<h1 id="title">Aqua Marine KA5</h1>
<p id="subtitle">Луксозен апартамент в Неа Перамос • 80 м от морето</p>
</header>

<div class="lang-switch">
<button onclick="setLang('bg')" class="primary">🇧🇬 Български</button>
<button onclick="setLang('en')" class="primary">🇬🇧 English</button>
</div>

<div class="container">

<!-- Информация за апартамента -->
<div class="card">
<h2 id="aboutTitle">За апартамента</h2>
<p id="aboutText">
• 2 спални<br>
• Собствено паркомясто<br>
• Тераса с барбекю и двор<br>
• Само на 80 м от морето
</p>
</div>

<!-- Цени -->
<div class="card">
<h2 id="priceTitle">Цени</h2>
<p id="priceText">
• 150€ на вечер (5+ нощувки)<br>
• 160€ на вечер (под 5 нощувки)
</p>
</div>

<!-- Галерия -->
<div class="card">
<h2 id="galleryTitle">Галерия</h2>
<div class="gallery">
<img src="img1.jpg" onclick="openImage(this.src)">
<img src="img2.jpg" onclick="openImage(this.src)">
<img src="img3.jpg" onclick="openImage(this.src)">
<img src="img4.jpg" onclick="openImage(this.src)">
<img src="img5.jpg" onclick="openImage(this.src)">
<img src="img6.jpg" onclick="openImage(this.src)">
<img src="img7.jpg" onclick="openImage(this.src)">
<img src="img8.jpg" onclick="openImage(this.src)">
<img src="img9.jpg" onclick="openImage(this.src)">
<img src="img10.jpg" onclick="openImage(this.src)">
<img src="img11.jpg" onclick="openImage(this.src)">
<img src="img12.jpg" onclick="openImage(this.src)">
<img src="img13.jpg" onclick="openImage(this.src)">
<img src="img14.jpg" onclick="openImage(this.src)">
<img src="img15.jpg" onclick="openImage(this.src)">
<img src="img16.jpg" onclick="openImage(this.src)">
<img src="img17.jpg" onclick="openImage(this.src)">
<img src="img18.jpg" onclick="openImage(this.src)">
<img src="img19.jpg" onclick="openImage(this.src)">
</div>
</div>

<div id="lightbox" onclick="closeImage()">
  <img id="lightbox-img">
</div>

<!-- Резервация -->
<div class="card" style="text-align:center">
<h2 id="bookTitle">Резервация</h2>
<button class="primary" onclick="alert('Тук ще свържем плащане с карта')">
💳 Плати депозит
</button>
</div>

</div>

<footer>
© 2026 Aqua Marine KA5 • Неа Перамос
</footer>

<script>
function setLang(lang){
if(lang==='en'){
title.innerText="Aqua Marine KA5";
subtitle.innerText="Luxury apartment in Nea Peramos • 80 m from the sea";
aboutTitle.innerText="About the apartment";
aboutText.innerHTML="• 2 bedrooms<br>• Private parking<br>• Terrace with BBQ and yard<br>• Only 80 m from the sea";
priceTitle.innerText="Prices";
priceText.innerHTML="• €150 per night (5+ nights)<br>• €160 per night (under 5 nights)";
galleryTitle.innerText="Gallery";
bookTitle.innerText="Booking";
}else{
title.innerText="Aqua Marine KA5";
subtitle.innerText="Луксозен апартамент в Неа Перамос • 80 м от морето";
aboutTitle.innerText="За апартамента";
aboutText.innerHTML="• 2 спални<br>• Собствено паркомясто<br>• Тераса с барбекю и двор<br>• Само на 80 м от морето";
priceTitle.innerText="Цени";
priceText.innerHTML="• 150€ на вечер (5+ нощувки)<br>• 160€ на вечер (под 5 нощувки)";
galleryTitle.innerText="Галерия";
bookTitle.innerText="Резервация";
}
}

function openImage(src){
document.getElementById("lightbox").style.display="flex";
document.getElementById("lightbox-img").src=src;
}

function closeImage(){
document.getElementById("lightbox").style.display="none";
}
</script>

</body>
</html>
