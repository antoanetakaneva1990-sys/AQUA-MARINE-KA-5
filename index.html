<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aqua Marine KA5</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#D8D8D8;
  font-family:'Roboto', sans-serif;
  font-size:17px;
  color:#2b2b2b;
  line-height:1.9;
}

header{
  background:linear-gradient(135deg,#033c3c,#0f6a6a);
  color:white;
  text-align:center;
  padding:60px 20px;
}

header h1{
  font-weight:700;
  font-size:3rem;
  margin:0 0 10px;
}

header p{
  font-size:1.2rem;
  margin:0;
}

.lang-switch{
  text-align:center;
  margin:15px 0;
}

.lang-switch button{
  margin:0 5px;
  background:#0f6a6a;
  color:white;
  border:none;
  padding:8px 16px;
  border-radius:6px;
  cursor:pointer;
}

.container{
  max-width:1150px;
  margin:auto;
  padding:20px;
}

.card{
  background:white;
  padding:30px;
  margin:20px 0;
  border-radius:16px;
  box-shadow:0 12px 30px rgba(0,0,0,0.08);
}

h2{
  font-weight:700;
  font-size:1.8rem;
  margin-bottom:15px;
}

.input-field{
  margin-bottom:10px;
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #cfcfcf;
  font-size:16px;
  background:#f7f7f7;
}

button.main-btn{
  background:#0f6a6a;
  color:white;
  border:none;
  padding:12px 22px;
  border-radius:8px;
  cursor:pointer;
  font-size:15px;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:15px;
}

.gallery img{
  width:100%;
  height:160px;
  object-fit:cover;
  border-radius:12px;
  cursor:pointer;
}

#lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:9999;
}

#lightbox img{
  max-width:90%;
  max-height:80%;
  border-radius:12px;
  margin-bottom:15px;
}

.map-container{
  width:100%;
  height:400px;
  border-radius:14px;
  overflow:hidden;
}

@media (max-width:768px){
  header h1{ font-size:2.2rem; }
  .card{ padding:20px; }
}
</style>
</head>

<body>

<header>
<h1>Aqua Marine KA5</h1>
<p id="subtitle"></p>
</header>

<div class="lang-switch">
<button onclick="setLang('bg')">Български</button>
<button onclick="setLang('en')">English</button>
</div>

<div class="container">

<div class="card">
<h2 id="aboutTitle"></h2>
<p id="aboutText"></p>
</div>

<div class="card">
<h2 id="stayTitle"></h2>
<p id="stayText"></p>
</div>

<div class="card">
<h2 id="pricesTitle"></h2>
<p id="pricesText"></p>
</div>

<div class="card">
<h2 id="bookingTitle"></h2>

<label id="checkinLabel"></label>
<input type="date" class="input-field">

<label id="nightsLabel"></label>
<input type="number" id="nights" min="1" value="1" class="input-field">

<p id="totalPrice" style="font-weight:600;"></p>
<p id="depositPrice" style="font-weight:600;"></p>

<button class="main-btn" id="payBtn"></button>
</div>

<div class="card">
<h2 id="galleryTitle"></h2>
<div class="gallery" id="gallery"></div>
</div>

<div id="lightbox">
<img id="lightbox-img">
<button class="main-btn" onclick="closeLightbox()">Close</button>
</div>

<div class="card">
<h2 id="contactTitle"></h2>
<p id="contactText"></p>
<p>🌐 <a href="https://www.facebook.com/share/17wdG6LS9p/?mibextid=wwXIfr" target="_blank">Facebook</a></p>
</div>

<div class="card">
<h2 id="mapTitle"></h2>
<div class="map-container">
<iframe src="https://www.google.com/maps?q=40.8517289,24.3140363&z=16&output=embed"
width="100%" height="100%" style="border:0;" allowfullscreen></iframe>
</div>
</div>

</div>

<script>

let currentLang="bg";

const t={
bg:{
subtitle:"Луксозен апартамент в Неа Перамос • 2 км от яхтеното пристанище на Ираклица",
aboutTitle:"ЗА АПАРТАМЕНТА",
about:"Потопете се в свят на спокойствие и изискан морски комфорт. Aqua Marine KA5 е идеален за до 4 гости с две отделни спални и възможност за спане на диван. Във всяка стая има телевизор, централна климатизация, баня с тоалетна и отделна тоалетна. Разполага с пералня, миялна, двор 20 м², собствено паркомясто и тераса с барбекю. Намира се близо до Амолофи и яхтеното пристанище на Ираклица.",
stayTitle:"НАСТАНЯВАНЕ",
stayText:"Настаняване: след 14:00 ч.<br>Напускане: до 10:00 ч.",
pricesTitle:"ЦЕНИ",
prices:"Под 5 нощувки: 160€/вечер<br>5 или повече нощувки: 150€/вечер",
bookingTitle:"РЕЗЕРВАЦИЯ",
checkin:"Дата на настаняване:",
nights:"Брой нощувки:",
total:"Обща цена:",
deposit:"Депозит (20%):",
pay:"ПЛАТИ ДЕПОЗИТ",
galleryTitle:"ГАЛЕРИЯ",
contactTitle:"КОНТАКТИ",
contactText:"📧 Имейл: antoaneta_n_k@yahoo.dk<br>📞 Телефон: 00359876644933",
mapTitle:"ЛОКАЦИЯ"
},
en:{
subtitle:"Luxury apartment in Nea Peramos • 2 km from Iraklitsa Marina",
aboutTitle:"ABOUT THE APARTMENT",
about:"Immerse yourself in comfort and refined seaside style. Aqua Marine KA5 accommodates up to 4 guests with two separate bedrooms and sofa sleeping option. TV in every room, central air conditioning, bathroom with toilet and additional separate toilet. Includes washing machine, dishwasher, 20 m² yard, private parking and barbecue terrace. Close to Ammolofoi beach and Iraklitsa marina.",
stayTitle:"CHECK-IN / CHECK-OUT",
stayText:"Check-in: after 14:00<br>Check-out: until 10:00",
pricesTitle:"PRICES",
prices:"Less than 5 nights: 160€/night<br>5+ nights: 150€/night",
bookingTitle:"BOOKING",
checkin:"Check-in date:",
nights:"Number of nights:",
total:"Total price:",
deposit:"Deposit (20%):",
pay:"PAY DEPOSIT",
galleryTitle:"GALLERY",
contactTitle:"CONTACT",
contactText:"📧 Email: antoaneta_n_k@yahoo.dk<br>📞 Phone: 00359876644933",
mapTitle:"LOCATION"
}
};

function setLang(lang){
currentLang=lang;
document.getElementById('subtitle').innerHTML=t[lang].subtitle;
document.getElementById('aboutTitle').innerHTML=t[lang].aboutTitle;
document.getElementById('aboutText').innerHTML=t[lang].about;
document.getElementById('stayTitle').innerHTML=t[lang].stayTitle;
document.getElementById('stayText').innerHTML=t[lang].stayText;
document.getElementById('pricesTitle').innerHTML=t[lang].pricesTitle;
document.getElementById('pricesText').innerHTML=t[lang].prices;
document.getElementById('bookingTitle').innerHTML=t[lang].bookingTitle;
document.getElementById('checkinLabel').innerHTML=t[lang].checkin;
document.getElementById('nightsLabel').innerHTML=t[lang].nights;
document.getElementById('payBtn').innerHTML=t[lang].pay;
document.getElementById('galleryTitle').innerHTML=t[lang].galleryTitle;
document.getElementById('contactTitle').innerHTML=t[lang].contactTitle;
document.getElementById('contactText').innerHTML=t[lang].contactText;
document.getElementById('mapTitle').innerHTML=t[lang].mapTitle;
updatePrice();
}

function updatePrice(){
let nights=parseInt(document.getElementById('nights').value)||0;
let pricePerNight=nights>=5?150:160;
let total=nights*pricePerNight;
let deposit=total*0.2;

document.getElementById('totalPrice').innerHTML=t[currentLang].total+" "+total+"€";
document.getElementById('depositPrice').innerHTML=t[currentLang].deposit+" "+deposit.toFixed(2)+"€";
}

document.getElementById('nights').addEventListener('input',updatePrice);

setLang('bg');

</script>

</body>
</html>
