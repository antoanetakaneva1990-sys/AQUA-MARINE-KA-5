  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #cfcfcf;

  background:#f7f7f7;
}

.map-container{

  header h1{ font-size:2.3rem; }

 document.getElementById('subtitle').innerHTML=t[lang].subtitle;
